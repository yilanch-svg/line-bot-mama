<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📒 京京的筆記本</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f5f5f5; color: #333; }
  header { background: #4CAF82; color: white; padding: 16px 20px; font-size: 20px; font-weight: bold; }
  .container { max-width: 680px; margin: 0 auto; padding: 16px; }

  .add-box { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .add-box textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 16px; resize: vertical; min-height: 80px; font-family: inherit; }
  .add-box button { margin-top: 10px; background: #4CAF82; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 16px; cursor: pointer; width: 100%; }
  .add-box button:hover { background: #3a9e6e; }

  .filter-box { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter-box input[type=text] { flex: 1; min-width: 140px; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 15px; }
  .filter-box select { border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 15px; background: white; cursor: pointer; }
  .filter-box button { background: #4CAF82; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 15px; cursor: pointer; }
  .filter-box button.reset { background: #eee; color: #555; }
  .filter-box button:hover { opacity: .85; }

  .count { font-size: 13px; color: #999; margin-bottom: 12px; }

  .note-card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; gap: 12px; align-items: flex-start; }
  .note-body { flex: 1; min-width: 0; }
  .note-date { font-size: 12px; color: #999; margin-bottom: 6px; }
  .note-content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .note-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; padding-top: 2px; }
  .btn-edit, .btn-del { background: none; border: none; font-size: 18px; cursor: pointer; line-height: 1; }
  .btn-edit:hover { opacity: .7; }
  .btn-del { color: #ccc; } .btn-del:hover { color: #e55; }

  .edit-area { margin-top: 8px; }
  .edit-area textarea { width: 100%; border: 1.5px solid #4CAF82; border-radius: 8px; padding: 8px; font-size: 16px; font-family: inherit; resize: vertical; min-height: 70px; }
  .edit-btns { margin-top: 6px; display: flex; gap: 8px; }
  .btn-save { background: #4CAF82; color: white; border: none; border-radius: 6px; padding: 6px 18px; font-size: 14px; cursor: pointer; }
  .btn-cancel { background: #eee; color: #555; border: none; border-radius: 6px; padding: 6px 14px; font-size: 14px; cursor: pointer; }

  .empty { text-align: center; color: #aaa; padding: 48px 0; font-size: 16px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 8px; font-size: 15px; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>📒 京京的筆記本</header>
<div class="container">

  <div class="add-box">
    <textarea id="new-content" placeholder="寫下想記的事…"></textarea>
    <button onclick="addNote()">＋ 新增筆記</button>
  </div>

  <div class="filter-box">
    <input type="text" id="search-kw" placeholder="關鍵字搜尋…" oninput="renderNotes()">
    <select id="sel-year" onchange="renderNotes()"><option value="">年份</option></select>
    <select id="sel-month" onchange="renderNotes()"><option value="">月份</option></select>
    <button class="reset" onclick="resetFilter()">清除</button>
  </div>

  <div class="count" id="count"></div>
  <div id="notes-list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// LINE user_id → 顯示名稱（等知道實際 ID 後填入）
const USER_NAMES = {
  'Uae768e5517dd14f206df9896d781626d': '方方',
  'Uab8239f0b88f4061a5114be006f94f65': '雷京',
};
const USER_COLORS = {
  'Uae768e5517dd14f206df9896d781626d': '#F5C518',
  'Uab8239f0b88f4061a5114be006f94f65': '#E8845A',
};

let allNotes = [];

async function loadNotes() {
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('user_id');
  const url = uid ? `/api/notes?user_id=${encodeURIComponent(uid)}` : '/api/notes';
  const res = await fetch(url);
  allNotes = await res.json();
  buildYearOptions();
  renderNotes();
}

function buildYearOptions() {
  const years = [...new Set(allNotes.map(n => new Date(n.created_at).getFullYear()))].sort((a,b)=>b-a);
  const sel = document.getElementById('sel-year');
  const cur = sel.value;
  sel.innerHTML = '<option value="">年份</option>' + years.map(y=>`<option value="${y}">${y}年</option>`).join('');
  if (cur) sel.value = cur;

  const msel = document.getElementById('sel-month');
  if (!msel.innerHTML.includes('1月')) {
    msel.innerHTML = '<option value="">月份</option>' + Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}月</option>`).join('');
  }
}

function resetFilter() {
  document.getElementById('search-kw').value = '';
  document.getElementById('sel-year').value = '';
  document.getElementById('sel-month').value = '';
  renderNotes();
}

function renderNotes() {
  const kw = document.getElementById('search-kw').value.trim();
  const year = parseInt(document.getElementById('sel-year').value) || null;
  const month = parseInt(document.getElementById('sel-month').value) || null;

  let filtered = allNotes.filter(n => {
    const d = new Date(n.created_at);
    const twYear = parseInt(d.toLocaleString('en',{year:'numeric',timeZone:'Asia/Taipei'}));
    const twMonth = parseInt(d.toLocaleString('en',{month:'numeric',timeZone:'Asia/Taipei'}));
    if (year && twYear !== year) return false;
    if (month && twMonth !== month) return false;
    if (kw && !n.content.includes(kw)) return false;
    return true;
  });

  document.getElementById('count').textContent = `共 ${filtered.length} 筆`;

  const list = document.getElementById('notes-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">沒有找到筆記</div>';
    return;
  }

  list.innerHTML = filtered.map(n => {
    const d = new Date(n.created_at);
    const date = d.toLocaleString('zh-TW', {year:'numeric', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', timeZone:'Asia/Taipei'});
    const userLabel = USER_NAMES[n.user_id] || (n.user_id ? n.user_id.slice(-6) : '未知');
    const userColor = USER_COLORS[n.user_id] || '#999';
    return `
    <div class="note-card" id="note-${n.id}">
      <div class="note-body">
        <div class="note-date">${date} <span style="background:${userColor};color:white;border-radius:4px;padding:1px 7px;font-size:11px;margin-left:4px;">${userLabel}</span></div>
        <div class="note-content" id="content-${n.id}">${escHtml(n.content)}</div>
        <div class="edit-area" id="edit-area-${n.id}" style="display:none">
          <textarea id="edit-input-${n.id}">${escHtml(n.content)}</textarea>
          <div class="edit-btns">
            <button class="btn-save" onclick="saveNote(${n.id})">儲存</button>
            <button class="btn-cancel" onclick="cancelEdit(${n.id})">取消</button>
          </div>
        </div>
      </div>
      <div class="note-actions">
        <button class="btn-edit" onclick="startEdit(${n.id})" title="編輯">✏️</button>
        <button class="btn-del" onclick="deleteNote(${n.id})" title="刪除">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function addNote() {
  const ta = document.getElementById('new-content');
  const content = ta.value.trim();
  if (!content) { showToast('請輸入內容'); return; }
  const res = await fetch('/api/notes', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({content})
  });
  if (res.ok) { ta.value = ''; showToast('✅ 已記下來了！'); loadNotes(); }
}

function startEdit(id) {
  document.getElementById(`content-${id}`).style.display = 'none';
  document.getElementById(`edit-area-${id}`).style.display = 'block';
  const ta = document.getElementById(`edit-input-${id}`);
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
}

function cancelEdit(id) {
  document.getElementById(`content-${id}`).style.display = '';
  document.getElementById(`edit-area-${id}`).style.display = 'none';
}

async function saveNote(id) {
  const content = document.getElementById(`edit-input-${id}`).value.trim();
  if (!content) { showToast('內容不能空白'); return; }
  const res = await fetch(`/api/notes/${id}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({content})
  });
  if (res.ok) {
    const note = allNotes.find(n => n.id === id);
    if (note) note.content = content;
    document.getElementById(`content-${id}`).textContent = content;
    cancelEdit(id);
    showToast('✅ 已儲存');
  }
}

async function deleteNote(id) {
  if (!confirm('確定要刪除這則筆記嗎？')) return;
  const res = await fetch(`/api/notes/${id}`, { method: 'DELETE' });
  if (res.ok) {
    allNotes = allNotes.filter(n => n.id !== id);
    buildYearOptions();
    renderNotes();
    showToast('已刪除');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2200);
}

loadNotes();
</script>
</body>
</html>
